<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1.25rem}
  .container{max-width:900px;margin:0 auto}
  .section{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
  .section-title{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  input,textarea,select{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-family:inherit;font-size:14px;background:#fafafa;color:#1a1a1a;outline:none;transition:border .15s}
  input:focus,textarea:focus,select:focus{border-color:#999}
  button{cursor:pointer;font-family:inherit;font-size:13px;border-radius:8px;border:1px solid #ddd;padding:7px 14px;background:transparent;color:#1a1a1a;transition:all .15s}
  button:hover{background:#f0f0f0}
  button:active{transform:scale(0.98)}
  .btn-primary{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8;font-weight:500}
  .btn-primary:hover{background:#bfdbfe}
  .badge{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500}
  .badge-done{background:#dcfce7;color:#166534}
  .badge-ing{background:#dbeafe;color:#1d4ed8}
  .badge-wait{background:#f3f4f6;color:#6b7280}
  .todo-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}
  .todo-item:last-child{border-bottom:none}
  .todo-item input[type=checkbox]{width:16px;height:16px;accent-color:#378ADD;flex-shrink:0;cursor:pointer}
  .todo-text{flex:1;font-size:14px}
  .todo-text.done{text-decoration:line-through;color:#aaa}
  .project-card{border:1px solid #e5e5e5;border-radius:8px;padding:12px 14px;margin-bottom:10px}
  .project-card:last-child{margin-bottom:0}
  .proj-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
  .proj-name{font-size:14px;font-weight:500}
  .proj-desc{font-size:13px;color:#666;margin-bottom:8px;line-height:1.5}
  .proj-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .github-link{font-size:12px;color:#1d4ed8;text-decoration:none;display:flex;align-items:center;gap:4px}
  .github-link:hover{text-decoration:underline}
  .del-btn{background:transparent;border:none;padding:4px 6px;color:#bbb;cursor:pointer;display:flex;align-items:center;border-radius:4px}
  .del-btn:hover{color:#ef4444;background:#fef2f2}
  .header-bar{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .clock{font-size:22px;font-weight:500}
  .today-date{font-size:13px;color:#888;margin-top:2px}
  .quote-area{text-align:right;max-width:420px}
  .quote-label{font-size:11px;color:#bbb;margin-bottom:4px;display:flex;align-items:center;gap:3px;justify-content:flex-end}
  .quote-display{font-size:13px;color:#555;line-height:1.6;font-style:italic}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:12px;padding:1.5rem;width:min(440px,92vw);border:1px solid #ddd}
  .modal-title{font-size:16px;font-weight:500;margin-bottom:1rem}
  .form-row{margin-bottom:12px}
  .form-label{font-size:12px;color:#888;margin-bottom:4px;display:block}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
  .row{display:flex;gap:8px}
  .tabs{display:flex;gap:4px;margin-bottom:1rem}
  .tab{font-size:13px;padding:5px 12px;border-radius:8px;border:1px solid #e5e5e5;cursor:pointer;background:transparent;color:#888}
  .tab.active{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8;font-weight:500}
  .empty{text-align:center;padding:2rem;color:#ccc;font-size:13px}
  .status-select{font-size:12px;padding:3px 8px;border-radius:99px;border:1px solid #e5e5e5;background:transparent;color:#888;cursor:pointer}
  .quote-list-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
  .quote-list-item:last-child{border-bottom:none}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  @media(max-width:640px){.grid{grid-template-columns:1fr}.quote-area{text-align:left}.quote-label{justify-content:flex-start}}
</style>
</head>
<body>
<div class="container">

  <div class="header-bar">
    <div>
      <div class="clock" id="clock">00:00:00</div>
      <div class="today-date" id="today-date"></div>
    </div>
    <div class="quote-area">
      <div class="quote-label"><i class="ti ti-quote" style="font-size:13px"></i> 오늘의 명언</div>
      <div class="quote-display" id="header-quote">명언을 추가해보세요!</div>
      <button onclick="showNextQuote()" style="margin-top:6px;padding:3px 10px;font-size:11px;border-radius:99px">
        <i class="ti ti-refresh" style="font-size:12px;vertical-align:-1px"></i> 다른 명언
      </button>
    </div>
  </div>

  <div class="grid">

    <div>
      <div class="section">
        <div class="section-title">
          <i class="ti ti-code" style="font-size:18px;color:#378ADD"></i>
          코딩 프로젝트
          <button onclick="openProjModal()" class="btn-primary" style="margin-left:auto;padding:5px 12px;font-size:12px">
            <i class="ti ti-plus" style="font-size:13px;vertical-align:-1px"></i> 추가
          </button>
        </div>
        <div class="tabs">
          <button class="tab active" onclick="filterProj('all',this)">전체</button>
          <button class="tab" onclick="filterProj('진행중',this)">진행중</button>
          <button class="tab" onclick="filterProj('완료',this)">완료</button>
          <button class="tab" onclick="filterProj('대기',this)">대기</button>
        </div>
        <div id="proj-list"></div>
      </div>
    </div>

    <div>
      <div class="section">
        <div class="section-title">
          <i class="ti ti-checkbox" style="font-size:18px;color:#1D9E75"></i>
          오늘 할 일
          <span id="todo-count" style="font-size:12px;color:#aaa;font-weight:400;margin-left:auto"></span>
        </div>
        <div class="row" style="margin-bottom:12px">
          <input type="text" id="todo-input" placeholder="할 일 입력 후 Enter" style="flex:1" onkeydown="if(event.key==='Enter')addTodo()">
          <button onclick="addTodo()" class="btn-primary"><i class="ti ti-plus"></i></button>
        </div>
        <div id="todo-list"></div>
      </div>

      <div class="section">
        <div class="section-title">
          <i class="ti ti-bulb" style="font-size:18px;color:#BA7517"></i>
          명언 관리
          <button onclick="toggleQuoteForm()" style="margin-left:auto;padding:5px 12px;font-size:12px">
            <i class="ti ti-plus" style="font-size:13px;vertical-align:-1px"></i> 추가
          </button>
        </div>
        <div id="quote-add-area" style="display:none;margin-bottom:12px">
          <textarea id="quote-text-input" placeholder="명언 내용을 입력하세요" rows="2" style="margin-bottom:6px;resize:none"></textarea>
          <div class="row">
            <input type="text" id="quote-author-input" placeholder="출처 / 저자 (선택)">
            <button onclick="addQuote()" class="btn-primary">저장</button>
          </div>
        </div>
        <div id="quote-list"></div>
      </div>
    </div>

  </div>
</div>

<div id="proj-modal" class="modal-overlay" onclick="if(event.target===this)closeProjModal()">
  <div class="modal">
    <div class="modal-title">프로젝트 추가</div>
    <div class="form-row">
      <label class="form-label">프로젝트 이름 *</label>
      <input type="text" id="p-name" placeholder="예: 포트폴리오 웹사이트">
    </div>
    <div class="form-row">
      <label class="form-label">설명</label>
      <textarea id="p-desc" rows="2" placeholder="간단한 설명" style="resize:none"></textarea>
    </div>
    <div class="form-row">
      <label class="form-label">GitHub 링크</label>
      <input type="text" id="p-link" placeholder="https://github.com/...">
    </div>
    <div class="form-row">
      <label class="form-label">상태</label>
      <select id="p-status">
        <option value="진행중">진행중</option>
        <option value="대기">대기</option>
        <option value="완료">완료</option>
      </select>
    </div>
    <div class="modal-actions">
      <button onclick="closeProjModal()">취소</button>
      <button onclick="saveProject()" class="btn-primary">저장</button>
    </div>
  </div>
</div>

<script>
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) } catch { return null } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)) } catch {} }
};

let projects = LS.get('dash_projects') || [];
let todos = LS.get('dash_todos') || [];
let quotes = LS.get('dash_quotes') || [];
let currentFilter = 'all';
let currentQuoteIdx = -1;

const statusClass = { 진행중: 'badge-ing', 완료: 'badge-done', 대기: 'badge-wait' };

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatDate() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function updateClock() {
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function showNextQuote() {
  const el = document.getElementById('header-quote');
  if (!quotes.length) { el.textContent = '명언을 추가해보세요!'; return; }
  let idx = Math.floor(Math.random() * quotes.length);
  if (quotes.length > 1 && idx === currentQuoteIdx) idx = (idx + 1) % quotes.length;
  currentQuoteIdx = idx;
  const q = quotes[idx];
  el.innerHTML = `"${esc(q.text)}"${q.author ? ` <span style="font-style:normal;font-size:12px;color:#aaa">— ${esc(q.author)}</span>` : ''}`;
}

function renderProjects() {
  const list = document.getElementById('proj-list');
  const filtered = currentFilter === 'all' ? projects : projects.filter(p => p.status === currentFilter);
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><i class="ti ti-folder-off" style="font-size:24px;display:block;margin-bottom:6px"></i>프로젝트가 없습니다</div>`;
    return;
  }
  list.innerHTML = filtered.map(p => {
    const ri = projects.indexOf(p);
    return `<div class="project-card">
      <div class="proj-top">
        <span class="proj-name">${esc(p.name)}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="badge ${statusClass[p.status]||'badge-wait'}">${p.status}</span>
          <button class="del-btn" onclick="deleteProject(${ri})"><i class="ti ti-trash" style="font-size:14px"></i></button>
        </div>
      </div>
      ${p.desc ? `<div class="proj-desc">${esc(p.desc)}</div>` : ''}
      <div class="proj-footer">
        ${p.link ? `<a href="${esc(p.link)}" class="github-link" target="_blank" rel="noopener"><i class="ti ti-brand-github" style="font-size:14px"></i> GitHub</a>` : ''}
        <select class="status-select" onchange="changeStatus(${ri},this.value)">
          <option ${p.status==='진행중'?'selected':''}>진행중</option>
          <option ${p.status==='대기'?'selected':''}>대기</option>
          <option ${p.status==='완료'?'selected':''}>완료</option>
        </select>
      </div>
    </div>`;
  }).join('');
}

function filterProj(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderProjects();
}

function openProjModal() { document.getElementById('proj-modal').classList.add('open'); }
function closeProjModal() {
  document.getElementById('proj-modal').classList.remove('open');
  ['p-name','p-desc','p-link'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-status').value = '진행중';
}

function saveProject() {
  const name = document.getElementById('p-name').value.trim();
  if (!name) return;
  projects.push({ name, desc: document.getElementById('p-desc').value.trim(), link: document.getElementById('p-link').value.trim(), status: document.getElementById('p-status').value });
  LS.set('dash_projects', projects);
  closeProjModal();
  renderProjects();
}

function deleteProject(i) { projects.splice(i, 1); LS.set('dash_projects', projects); renderProjects(); }
function changeStatus(i, v) { projects[i].status = v; LS.set('dash_projects', projects); renderProjects(); }

function renderTodos() {
  const list = document.getElementById('todo-list');
  const done = todos.filter(t => t.done).length;
  document.getElementById('todo-count').textContent = todos.length ? `${done}/${todos.length} 완료` : '';
  if (!todos.length) {
    list.innerHTML = `<div class="empty"><i class="ti ti-check" style="font-size:24px;display:block;margin-bottom:6px"></i>할 일을 추가해보세요</div>`;
    return;
  }
  list.innerHTML = todos.map((t, i) => `<div class="todo-item">
    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${i})">
    <span class="todo-text${t.done ? ' done' : ''}">${esc(t.text)}</span>
    <button class="del-btn" onclick="deleteTodo(${i})"><i class="ti ti-x" style="font-size:13px"></i></button>
  </div>`).join('');
}

function addTodo() {
  const inp = document.getElementById('todo-input');
  const v = inp.value.trim();
  if (!v) return;
  todos.push({ text: v, done: false });
  LS.set('dash_todos', todos);
  inp.value = '';
  renderTodos();
}

function toggleTodo(i) { todos[i].done = !todos[i].done; LS.set('dash_todos', todos); renderTodos(); }
function deleteTodo(i) { todos.splice(i, 1); LS.set('dash_todos', todos); renderTodos(); }

function toggleQuoteForm() {
  const a = document.getElementById('quote-add-area');
  a.style.display = a.style.display === 'none' ? 'block' : 'none';
}

function renderQuoteList() {
  const el = document.getElementById('quote-list');
  if (!quotes.length) {
    el.innerHTML = `<div class="empty" style="padding:1rem"><i class="ti ti-quote" style="font-size:20px;display:block;margin-bottom:4px"></i>명언을 추가해보세요</div>`;
    return;
  }
  el.innerHTML = quotes.map((q, i) => `<div class="quote-list-item">
    <span style="flex:1;color:#555">"${esc(q.text)}"${q.author ? ` <span style="color:#aaa">— ${esc(q.author)}</span>` : ''}</span>
    <button class="del-btn" onclick="deleteQuote(${i})"><i class="ti ti-trash" style="font-size:13px"></i></button>
  </div>`).join('');
}

function addQuote() {
  const t = document.getElementById('quote-text-input').value.trim();
  const a = document.getElementById('quote-author-input').value.trim();
  if (!t) return;
  quotes.push({ text: t, author: a });
  LS.set('dash_quotes', quotes);
  document.getElementById('quote-text-input').value = '';
  document.getElementById('quote-author-input').value = '';
  document.getElementById('quote-add-area').style.display = 'none';
  renderQuoteList();
  showNextQuote();
}

function deleteQuote(i) { quotes.splice(i, 1); LS.set('dash_quotes', quotes); renderQuoteList(); showNextQuote(); }

document.getElementById('today-date').textContent = formatDate();
updateClock();
setInterval(updateClock, 1000);
renderProjects();
renderTodos();
renderQuoteList();
showNextQuote();
</script>
</body>
</html>
